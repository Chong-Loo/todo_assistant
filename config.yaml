mail:
  host: ""                 # IMAP server address
  port: 993                # IMAP server port    
  username: ""          # Email account username
  use_ssl: true         # Whether to use SSL for IMAP connection
  folder: INBOX         # Mailbox folder to monitor (e.g., INBOX)

llm:
  # 默认使用公司内网模型，打包后开箱即用
  endpoint: ""
  model: ""
  timeout: 60
  token_encoded: ""

task:
  daily_run_time: "08:30"
  lookback_days: 0      
  max_mail_count: 100
  max_email_bytes: 80000

security:
  enable_desensitize: true
  save_raw_email: false

app:
  confirm_close: true
  close_action: minimize
  appearance:
    theme: light
  notification:
    enabled: true
    duration: 10
    show_startup_banner: true
